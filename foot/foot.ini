
include=~/.config/foot/colors/default.ini

font=Fira Mono:medium:pixelsize=18,SymbolsNerdFontMono-Regular:pixelsize=18
font-bold=Fira Mono:medium:pixelsize=18,SymbolsNerdFontMono-Regular:pixelsize=18
font-italic=Fira Mono:medium:pixelsize=18,SymbolsNerdFontMono-Regular:pixelsize=18

line-height=20px
letter-spacing=0px
horizontal-letter-offset=0px
vertical-letter-offset=0px
dpi-aware=no

font-size-adjustment=2px
underline-thickness=1px

term=st-256color

initial-window-size-pixels=800x600
initial-window-mode=maximized
pad=0x0

word-delimiters=,│`|:"'-()[]{}<>
selection-target=primary

[colors]

alpha=0.96

[bell]
urgent=yes
notify=yes

[csd]
preferred=none
size=0
button-width=0

[key-bindings]
scrollback-up-half-page=Control+Shift+k
scrollback-down-half-page=Control+Shift+j
clipboard-copy=Control+Shift+l
clipboard-paste=Control+Shift+p
primary-paste=Shift+Insert
search-start=Control+Shift+slash
font-increase=Control+Shift+m
font-decrease=Control+Shift+g
font-reset=Control+Shift+y
show-urls-launch=Control+Shift+i

[search-bindings]
find-prev=Control+Shift+p
find-next=Control+Shift+n

[mouse-bindings]
primary-paste=BTN_MIDDLE
select-begin=BTN_LEFT
select-begin-block=Control+BTN_LEFT
select-extend=BTN_RIGHT
select-extend-character-wise=Mod1+BTN_RIGHT
select-word=Control+BTN_RIGHT
select-word-whitespace=Mod1+BTN_MIDDLE
select-row=Control+BTN_MIDDLE

